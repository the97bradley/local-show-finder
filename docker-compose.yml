services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000/api/v1
    command: sh -c "rm -rf /app/.next/* && npm install && npm run dev"
    ports:
      - "3000:3000"

volumes:
  web_node_modules:
  web_next_cache:
